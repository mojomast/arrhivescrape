<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Archive Recovery{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="/static/app.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Archive Recovery</a>
    <span class="badge">Local only</span>
  </header>
  <div class="shell">
    <nav class="rail" aria-label="Primary">
      <a href="/">Dashboard</a>
      <a href="/targets">Targets</a>
      <a href="/runs">Runs</a>
      <a href="/api/status">API</a>
    </nav>
    <main class="content">
      {% block body %}{% endblock %}
    </main>
  </div>
</body>
</html>
